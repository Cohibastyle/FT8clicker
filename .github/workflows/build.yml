name: Build FT8Clicker (Windows + macOS)

on:
  push:
    branches: [ main ]
    tags:
      - "v*"
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # -------------------------
  # WINDOWS BUILD
  # -------------------------
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows EXE (no spec)
        run: |
          pyinstaller --noconfirm --clean --onefile --name FT8Clicker main.py
          echo "Build output:"
          dir dist

      - name: Upload Windows EXE (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: FT8Clicker-Windows
          path: dist/FT8Clicker.exe


  # -------------------------
  # MACOS BUILD
  # -------------------------
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS app (no spec)
        run: |
          pyinstaller --noconfirm --clean --windowed --name FT8Clicker main.py
          echo "Build output:"
          ls -R dist

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          APP_PATH="dist/FT8Clicker.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: App not found at $APP_PATH"
            echo "Directory listing:"
            ls -R dist
            exit 1
          fi

          create-dmg \
            --volname "FT8Clicker" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 400 200 \
            "FT8Clicker.dmg" \
            "$APP_PATH"

      - name: Upload macOS DMG (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: FT8Clicker-macOS
          path: FT8Clicker.dmg


  # -------------------------
  # RELEASE UPLOAD (only on tag)
  # -------------------------
  upload-to-release:
    name: Upload .exe/.dmg to GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-mac]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: FT8Clicker-Windows
          path: release-assets

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: FT8Clicker-macOS
          path: release-assets

      - name: List assets
        run: ls -la release-assets

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/FT8Clicker.exe
            release-assets/FT8Clicker.dmg
